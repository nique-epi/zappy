name: build and mirror

on:
  push:
    branches:
      - "main"
  pull_request:
    branches-ignore:
      - "ga-ignore-*"

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y build-essential cmake

      - name: Build project
        run: cmake -S . -B build && cmake --build build --config Release

      - name: Run tests
        run: |
          ctest --output-on-failure

  python-lint:
    name: Python Lint (pylint + flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install pylint flake8

      - name: Run flake8
        run: flake8 ia/

      - name: Run pylint
        run: pylint ia/
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  push_to_mirror:
    name: Push to Mirror Repository
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ github.event_name == 'push' }}

    env:
      MIRROR_URL: "git@github.com:EpitechPGE2-2025/G-YEP-400-NAN-4-1-zappy-2.git"

    steps:
      - name: Check if repository is a mirror
        id: is_mirror_repo
        run: |
          REPO_PATH=$(echo "${{ github.repositoryUrl }}" | sed -E 's|^git://github.com/(.+)\.git$|\1|')
          MIRROR_PATH=$(echo "${{ env.MIRROR_URL }}" | sed -E 's|^git@github.com:(.+)\.git$|\1|')

          if [[ "$REPO_PATH" == "$MIRROR_PATH" ]]; then
            echo "is_mirror=true" >> $GITHUB_OUTPUT
          else
            echo "is_mirror=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: ${{ steps.is_mirror_repo.outputs.is_mirror == 'false' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to mirror
        if: ${{ steps.is_mirror_repo.outputs.is_mirror == 'false' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}

      - name: Filter .claude/ from history and push to mirror
        if: ${{ steps.is_mirror_repo.outputs.is_mirror == 'false' }}
        run: |
          pip install --quiet git-filter-repo
          git filter-repo --force --path .claude --invert-paths
          git remote add mirror "${{ env.MIRROR_URL }}"
          git push --force --mirror mirror
